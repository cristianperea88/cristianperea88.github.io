<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dos Columnas</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<canvas id="canvas" style="position: fixed; top: 0; left: 0; z-index: 0;"></canvas>

	<div class="container">

		<div class="left-column">
			<img src="arch.gif" alt="GIF animado" class="centered-gif" />
		</div>
		<div class="right-column">
			<div id="container">
				<div id="cursor-line">
					<span>>&nbsp</span>
					<span id="search-text">
						<span id="typed-text"></span><span id="blinker"></span>
					</span>
				</div>
			</div>

			<input id="hidden-input" type="text" autocomplete="off" />

			<!-- Script -->
			<script>
				const searchTextElement = document.getElementById('search-text');
				const hiddenInput = document.getElementById('hidden-input');

				hiddenInput.addEventListener('input', () => {
					searchTextElement.textContent = hiddenInput.value;
				});

				hiddenInput.addEventListener('keydown', (event) => {
					if (event.key === 'Enter') {
						const trimmedQuery = hiddenInput.value.trim();
						if (trimmedQuery !== '') {
							if (isValidUrl(trimmedQuery)) {
								let urlToOpen = trimmedQuery;
								if (!urlToOpen.startsWith('http://') && !urlToOpen.startsWith('https://')) {
									urlToOpen = `http://${urlToOpen}`;
								}
								window.location.href = urlToOpen;
							} else {
								window.location.href = `https://www.google.com/search?q=${encodeURIComponent(trimmedQuery)}`;
							}
						}
						hiddenInput.value = '';
						searchTextElement.textContent = '';
					}
				});

				function isValidUrl(string) {
					const urlRegex = /^(https?:\/\/)?([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/\S*)?$/;
					return urlRegex.test(string);
				}

				window.onload = function () {
					hiddenInput.focus();
				};
			</script>
		</div>
	</div>

	<!-- botones arriba -->

	<div class="top-right-buttons">
		<a href="https://chatgpt.com" class="ai-button" target="_blank" title="ChatGPT">
			<span class="emoji">⚜️</span>

		</a>

	<div class="bottom-right-buttons">

	<div class="footer-text">
		<a href="https://cristianfabianperea.notion.site/20-29-Cristian-Fabi-n-Perea-085f39851d424edfaea862cfb220e2a9?source=copy_link"
			target="_blank" rel="noopener noreferrer">
			Ing. Cristian Fabian Perea
		</a>
	</div>


	<!-- Script de partículas -->
	<script>
		const canvasBody = document.getElementById("canvas");
		const drawArea = canvasBody.getContext("2d");
		let w, h, particles;

		const opts = {
			particleColor: "rgb(143, 143, 143)",
			lineColor: "rgb(143, 143, 143)",
			particleAmount: 50,
			defaultSpeed: 0.5,
			variantSpeed: 1,
			defaultRadius: 5,
			variantRadius: 9,
			linkRadius: 150,
		};


		function resizeReset() {
			w = canvasBody.width = window.innerWidth;
			h = canvasBody.height = window.innerHeight;
		}

		window.addEventListener("resize", () => {
			clearTimeout(window.resizeTimeout);
			window.resizeTimeout = setTimeout(resizeReset, 200);
		});

		function checkDistance(x1, y1, x2, y2) {
			return Math.hypot(x2 - x1, y2 - y1);
		}

		function linkPoints(point1, hubs) {
			const rgb = opts.lineColor.match(/\d+/g);
			for (let i = 0; i < hubs.length; i++) {
				const distance = checkDistance(point1.x, point1.y, hubs[i].x, hubs[i].y);
				const opacity = 1 - distance / opts.linkRadius;
				if (opacity > 0) {
					drawArea.lineWidth = 1;
					drawArea.strokeStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${opacity})`;
					drawArea.beginPath();
					drawArea.moveTo(point1.x, point1.y);
					drawArea.lineTo(hubs[i].x, hubs[i].y);
					drawArea.stroke();
				}
			}
		}

		class Particle {
			constructor() {
				this.x = Math.random() * w;
				this.y = Math.random() * h;
				this.speed = opts.defaultSpeed + Math.random() * opts.variantSpeed;
				this.directionAngle = Math.random() * Math.PI * 2;
				this.color = opts.particleColor;
				this.radius = opts.defaultRadius + Math.random() * opts.variantRadius;
				this.vector = {
					x: Math.cos(this.directionAngle) * this.speed,
					y: Math.sin(this.directionAngle) * this.speed
				};
			}

			update() {
				this.border();
				this.x += this.vector.x;
				this.y += this.vector.y;
			}

			border() {
				if (this.x >= w || this.x <= 0) this.vector.x *= -1;
				if (this.y >= h || this.y <= 0) this.vector.y *= -1;
				this.x = Math.max(0, Math.min(w, this.x));
				this.y = Math.max(0, Math.min(h, this.y));
			}

			draw() {
				drawArea.beginPath();
				drawArea.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
				drawArea.fillStyle = this.color;
				drawArea.fill();
			}
		}

		function setup() {
			particles = [];
			resizeReset();
			for (let i = 0; i < opts.particleAmount; i++) {
				particles.push(new Particle());
			}
			loop();
		}

		function loop() {
			drawArea.clearRect(0, 0, w, h);
			for (const particle of particles) {
				particle.update();
				particle.draw();
			}
			for (const particle of particles) {
				linkPoints(particle, particles);
			}
			requestAnimationFrame(loop);
		}
		setup();
	</script>

	<div id="cursor-line">
		<div id="search-text">
			<span id="typed-text"></span><span id="blinker"></span>
		</div>
	</div>


	<script>
		const text = "Hola, mi Inge.";
		const typedText = document.getElementById("typed-text");

		let index = 0;

		function typeWriter() {
			if (index < text.length) {
				typedText.textContent += text.charAt(index);
				index++;
				setTimeout(typeWriter, 80); // velocidad de tipeo (en ms)
			}
		}
		// Inicia cuando la página carga
		window.addEventListener("load", () => {
			typeWriter();
		});
	</script>
</body>
</html>
